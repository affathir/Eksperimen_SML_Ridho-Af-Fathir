name: Automate Data Preprocessing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  preprocess-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn joblib

    - name: Run preprocessing automation
      run: |
        python preprocessing/automate_ridho.py

    - name: Commit and Push clean data and artifacts
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add padi_preprocessing/*
        git commit -m "Auto-update dataset & artifacts via GitHub Actions" || echo "No changes to commit"
        git push
